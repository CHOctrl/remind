<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remind Me - Pink</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .pink-gradient {
            background: radial-gradient(circle, rgba(255,241,242,1) 0%, rgba(255,228,230,1) 100%);
        }
        .text-huge {
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(244, 63, 94, 0.2);
        }
    </style>
</head>
<body class="pink-gradient min-h-screen overflow-x-hidden text-rose-600 selection:bg-rose-200">

    <!-- Background Decoration -->
    <div class="fixed inset-0 pointer-events-none opacity-20">
        <div id="circle1" class="absolute w-96 h-96 bg-rose-300 rounded-full blur-[100px] -top-20 -left-20"></div>
        <div id="circle2" class="absolute w-80 h-80 bg-pink-200 rounded-full blur-[80px] bottom-0 right-0"></div>
    </div>

    <main class="relative z-10 flex flex-col items-center justify-center p-8 min-h-screen text-center">
        
        <!-- Section 1 -->
        <section class="min-h-screen flex flex-col justify-center items-center gap-12">
            <h1 id="text1" class="text-huge font-black uppercase tracking-tighter text-glow">
                อย่าลืมกด<span class="text-rose-400">สมใจ 2</span> <br>
                ก่อนเปลี่ยนเครื่อง <br>
                หลังเปลี่ยนเครื่อง<br>
                อย่าลืมกด <span class="text-rose-400">3</span>
            </h1>
            <div class="animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                </svg>
            </div>
        </section>

        <!-- Section 2 -->
        <section class="min-h-screen flex flex-col justify-center items-center">
            <h2 id="text2" class="text-huge font-black tracking-tight text-glow">
                เซ็ตติ้งเครื่องใหม่<br>
                ให้กด <span class="bg-rose-600 text-white px-4 rounded-xl">ข้อ 7</span> <br>
                กดเข้าไป<span class="italic text-rose-400">FOR IT</span> <br>
                กด <span class="underline decoration-wavy">0B NAC</span>
            </h2>
        </section>

    </main>

    <footer class="fixed bottom-4 right-4 text-xs font-mono opacity-50">
        MINIMAL PINK VIBE / 2026
    </footer>

    <script src="script.js"></script>
</body>
</html>
